services:
  - type: web
    name: plagiarcheck-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 5000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: MIDTRANS_SERVER_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
